<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1E40AF"/>
<title>Gada Group — הזמנה</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Tahoma,sans-serif;direction:rtl;background:#F1F5F9;min-height:100vh;padding:16px;}
.card{background:#fff;border-radius:16px;padding:24px;max-width:480px;margin:0 auto;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.logo-icon{background:#1E40AF;border-radius:12px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
h1{font-size:20px;font-weight:800;color:#1E293B;}
h2{font-size:13px;color:#94A3B8;font-weight:400;margin-top:2px;}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;margin-top:16px;}
select,input,textarea{width:100%;padding:12px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:15px;outline:none;background:#FAFAFA;color:#1E293B;font-family:inherit;direction:rtl;}
select:focus,input:focus,textarea:focus{border-color:#1D4ED8;background:#fff;}
select:disabled{background:#E2E8F0;cursor:not-allowed;opacity:0.6;}
.qty-row{display:flex;align-items:center;gap:10px;margin-top:6px;}
.qty-btn{width:44px;height:44px;border-radius:10px;border:1.5px solid #E2E8F0;background:#F1F5F9;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#374151;transition:all .1s;}
.qty-btn:active{transform:scale(.93);}
.qty-btn.plus{background:#EFF6FF;border-color:#BFDBFE;color:#1D4ED8;}
.qty-btn.minus{background:#FEF2F2;border-color:#FECACA;color:#DC2626;}
.qty-display{flex:1;text-align:center;font-size:28px;font-weight:800;color:#1D4ED8;padding:8px;border:1.5px solid #BFDBFE;border-radius:10px;background:#EFF6FF;}
.submit-btn{width:100%;padding:16px;background:#1D4ED8;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;margin-top:24px;font-family:inherit;transition:all .15s;}
.submit-btn:active{transform:scale(.98);background:#1E40AF;}
.submit-btn:disabled{background:#94A3B8;cursor:not-allowed;}
.success{display:none;text-align:center;padding:32px 16px;}
.success-icon{font-size:60px;margin-bottom:16px;}
.success-title{font-size:22px;font-weight:800;color:#15803D;margin-bottom:8px;}
.success-sub{font-size:14px;color:#6B7280;}
.new-order-btn{margin-top:20px;padding:12px 24px;background:#F0FDF4;border:1.5px solid #86EFAC;border-radius:10px;color:#15803D;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.branch-info{background:#F8FAFF;border:1.5px solid #DBEAFE;border-radius:10px;padding:12px 14px;margin-top:8px;}
.branch-name{font-size:16px;font-weight:700;color:#1E293B;}
.branch-addr{font-size:12px;color:#94A3B8;margin-top:2px;}
.chain-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:6px;}
.note-field{resize:none;height:80px;}
.footer{text-align:center;margin-top:24px;font-size:11px;color:#CBD5E1;}
.loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="card" id="form-card">
  <div class="logo">
    <div class="logo-icon">🚛</div>
    <div>
      <h1>Gada Group</h1>
      <h2>טופס הזמנת משטחים</h2>
    </div>
  </div>

  <label>שם הסוכן *</label>
  <input type="text" id="agent-name" placeholder="שם מלא" autocomplete="name"/>

  <label>רשת *</label>
  <select id="chain-select" onchange="filterBranches()">
    <option value="">— בחר רשת —</option>
    <option>דן דיל</option>
    <option>זול סטוק</option>
    <option>בום</option>
    <option>מקס סטוק</option>
    <option>ביג סטוק</option>
    <option>סיטי מרקט</option>
    <option>הסטוק</option>
    <option>גמה דיל</option>
  </select>

  <label>סניף *</label>
  <select id="branch-select" onchange="showBranchInfo()" disabled>
    <option value="">— בחר סניף —</option>
  </select>
  <div class="branch-info" id="branch-info" style="display:none"></div>

  <label>כמות משטחים *</label>
  <div class="qty-row">
    <button class="qty-btn minus" onclick="changeQty(-1)">−</button>
    <div class="qty-display" id="qty-display">1</div>
    <button class="qty-btn plus" onclick="changeQty(1)">+</button>
  </div>

  <label>הערה (אופציונלי)</label>
  <textarea class="note-field" id="note" placeholder="הערות מיוחדות להזמנה..."></textarea>

  <button class="submit-btn" id="submit-btn" onclick="submitOrder()">
    📦 שלח הזמנה
  </button>

  <div class="footer">© כל הזכויות שמורות לסטס זולין · Gada Group</div>
</div>

<div class="card success" id="success-card">
  <div class="success-icon">✅</div>
  <div class="success-title">ההזמנה נשלחה!</div>
  <div class="success-sub" id="success-details"></div>
  <button class="new-order-btn" onclick="resetForm()">+ הזמנה חדשה</button>
  <div class="footer" style="margin-top:16px">© כל הזכויות שמורות לסטס זולין · Gada Group</div>
</div>
