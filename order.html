<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Gada Group — הזמנה</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Tahoma,sans-serif;direction:rtl;background:#F1F5F9;min-height:100vh;padding:16px;}
.card{background:#fff;border-radius:16px;padding:24px;max-width:480px;margin:0 auto;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.logo-icon{background:#1E40AF;border-radius:12px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
h1{font-size:20px;font-weight:800;color:#1E293B;}
h2{font-size:13px;color:#94A3B8;font-weight:400;margin-top:2px;}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;margin-top:16px;}
select,input,textarea{width:100%;padding:12px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:15px;outline:none;background:#FAFAFA;color:#1E293B;font-family:inherit;direction:rtl;}
select:focus,input:focus{border-color:#1D4ED8;background:#fff;}
select:disabled{background:#E2E8F0;cursor:not-allowed;opacity:0.6;}
.qty-row{display:flex;align-items:center;gap:10px;margin-top:6px;}
.qty-btn{width:44px;height:44px;border-radius:10px;border:1.5px solid #E2E8F0;background:#F1F5F9;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#374151;}
.qty-display{flex:1;text-align:center;font-size:28px;font-weight:800;color:#1D4ED8;padding:8px;border:1.5px solid #BFDBFE;border-radius:10px;background:#EFF6FF;}
.submit-btn{width:100%;padding:16px;background:#1D4ED8;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;margin-top:24px;font-family:inherit;}
.submit-btn:disabled{background:#94A3B8;}
.branch-info{background:#F8FAFF;border:1.5px solid #DBEAFE;border-radius:10px;padding:12px 14px;margin-top:8px;display:none;}
.success{display:none;text-align:center;padding:32px 16px;}
.footer{text-align:center;margin-top:24px;font-size:11px;color:#CBD5E1;}
</style>
</head>
<body>

<div class="card" id="form-card">
  <div class="logo">
    <div class="logo-icon">🚛</div>
    <div>
      <h1>Gada Group</h1>
      <h2>טופס הזמנת משטחים</h2>
    </div>
  </div>

  <label>שם הסוכן *</label>
  <input type="text" id="agent-name" placeholder="שם מלא">

  <label>רשת *</label>
  <select id="chain-select" onchange="filterBranches()">
    <option value="">— בחר רשת —</option>
    <option value="דן דיל">דן דיל</option>
    <option value="זול סטוק">זול סטוק</option>
    <option value="בום">בום</option>
    <option value="מקס סטוק">מקס סטוק</option>
    <option value="ביג סטוק">ביג סטוק</option>
    <option value="סיטי מרקט">סיטי מרקט</option>
    <option value="הסטוק">הסטוק</option>
    <option value="גמה דיל">גמה דיל</option>
  </select>

  <label>סניף *</label>
  <select id="branch-select" onchange="showBranchInfo()" disabled>
    <option value="">— בחר סניף —</option>
  </select>

  <div class="branch-info" id="branch-info"></div>

  <label>כמות משטחים *</label>
  <div class="qty-row">
    <button class="qty-btn" onclick="changeQty(-1)">−</button>
    <div class="qty-display" id="qty-display">1</div>
    <button class="qty-btn" onclick="changeQty(1)">+</button>
  </div>

  <label>הערה (אופציונלי)</label>
  <textarea id="note" style="height:80px;" placeholder="הערות מיוחדות..."></textarea>

  <button class="submit-btn" id="submit-btn" onclick="submitOrder()">📦 שלח הזמנה</button>
  <div class="footer">© כל הזכויות שמורות לסטס זולין · Gada Group</div>
</div>

<div class="card success" id="success-card">
  <div style="font-size:60px">✅</div>
  <h1 style="color:#15803D">ההזמנה נשלחה!</h1>
  <div id="success-details" style="margin:16px 0; font-size:14px; color:#64748B"></div>
  <button class
