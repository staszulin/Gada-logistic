<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
    <title>Gada Group — הזמנה</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:system-ui,-apple-system,sans-serif;direction:rtl;background:#F1F5F9;padding:16px;line-height:1.5;}
        .card{background:#fff;border-radius:16px;padding:24px;max-width:480px;margin:0 auto;box-shadow:0 4px 15px rgba(0,0,0,0.05);}
        .logo{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
        .logo-icon{background:#1E40AF;border-radius:12px;width:45px;height:45px;display:flex;align-items:center;justify-content:center;font-size:24px;}
        h1{font-size:20px;font-weight:800;color:#1E293B;}
        label{display:block;font-size:13px;font-weight:600;color:#374151;margin-top:16px;margin-bottom:6px;}
        input,select,textarea{width:100%;padding:12px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:16px;background:#FAFAFA;font-family:inherit;}
        select:disabled{background:#F1F5F9;cursor:not-allowed;opacity:0.7;}
        .qty-row{display:flex;align-items:center;gap:10px;margin-top:8px;}
        .qty-btn{width:50px;height:50px;border-radius:10px;border:1.5px solid #E2E8F0;background:#fff;font-size:24px;cursor:pointer;color:#1E293B;}
        .qty-display{flex:1;text-align:center;font-size:28px;font-weight:800;color:#1D4ED8;background:#EFF6FF;padding:10px;border-radius:10px;border:1.5px solid #BFDBFE;}
        .submit-btn{width:100%;padding:16px;background:#1D4ED8;color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;margin-top:24px;}
        #branch-info{background:#F8FAFF;border:1px solid #DBEAFE;border-radius:8px;padding:12px;margin-top:10px;display:none;font-size:14px;}
        .success-card{display:none;text-align:center;padding:40px 20px;}
    </style>
</head>
<body>

<div id="form-container" class="card">
    <div class="logo">
        <div class="logo-icon">🚛</div>
        <div>
            <h1>Gada Group</h1>
            <p style="font-size:12px;color:#94A3B8">טופס הזמנת משטחים</p>
        </div>
    </div>

    <label>שם הסוכן *</label>
    <input type="text" id="agent-name" placeholder="הכנס שם מלא">

    <label>רשת *</label>
    <select id="chain-select" onchange="updateBranches()">
        <option value="">— בחר רשת —</option>
        <option>דן דיל</option>
        <option>זול סטוק</option>
        <option>בום</option>
        <option>מקס סטוק</option>
        <option>ביג סטוק</option>
        <option>סיטי מרקט</option>
        <option>הסטוק</option>
        <option>גמה דיל</option>
    </select>

    <label>סניף *</label>
    <select id="branch-select" onchange="showInfo()" disabled>
        <option value="">— בחר סניף —</option>
    </select>
    <div id="branch-info"></div>

    <label>כמות משטחים *</label>
    <div class="qty-row">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <div class="qty-display" id="qty-val">1</div>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>

    <label>הערה</label>
    <textarea id="note" rows="2" placeholder="הערות להזמנה..."></textarea>

    <button class="submit-btn" id="send-btn" onclick="sendOrder()">📦 שלח הזמנה</button>
</div>

<div id="success-screen" class="card success-card">
    <div style="font-size:60px;margin-bottom:15px;">✅</div>
    <h2 style="color:#15803D;margin-bottom:10px;">ההזמנה נשלחה!</h2>
    <p id="summary" style="margin-bottom:25px;color:#64748B;"></p>
    <button class="submit-btn" style="background:#22C55E" onclick="location.reload()">הזמנה חדשה +</button>
</div>

<script>
const DB_URL = "https://gada-grup-default-rtdb.asia-southeast1.firebasedatabase.app/orders.json";

const BRANCHES = [
    {id:101,chain:"דן דיל",city:"עכו",address:"הרצל 20"},
    {id:102,chain:"דן דיל",city:"קרית חיים",address:"איצטדיון 5"},
    {id:103,chain:"דן דיל",city:"טירת כרמל",address:"המלאכה 3"},
    {id:104,chain:"דן דיל",city:"פרדס חנה",address:"הדקלים 99"},
    {id:201,chain:"זול סטוק",city:"קרית ביאליק",address:"שכונת אפקה"},
    {id:202,chain:"זול סטוק",city:"אלבטוף",address:"רומת אלהייב"},
    {id:203,chain:"זול סטוק",city:"זרזיר",address:"אלסלאם 129"},
    {id:301,chain:"בום",city:"אור יהודה",address:"החרושת 32"},
    {id:302,chain:"בום",city:"אשדוד",address:"קניון הסיטי"},
    {id:303,chain:"בום",city:"אשקלון",address:"התחייה"},
    {id:401,chain:"מקס סטוק",city:"אום אל פחם",address:"מקס 20"},
    {id:402,chain:"מקס סטוק",city:"אור עקיבא",address:"ההדס 22"},
    {id:501,chain:"ביג סטוק",city:"נתניה",address:"א.ת נתניה"},
    {id:601,chain:"סיטי מרקט",city:"תל אביב",address:"א.ת הצפון"},
    {id:701,chain:"הסטוק",city:"אופקים",address:"ז בוטינסקי 33"},
    {id:801,chain:"גמה דיל",city:"כרמיאל ביג",address:"ביג כרמיאל"},
    {id:802,chain:"גמה דיל",city:"נהריה",address:"הגדוד 21"}
    // הוסף כאן עוד סניפים אם חסר
];

let currentQty = 1;

function updateBranches() {
    const chain = document.getElementById("chain-select").value;
    const branchSelect = document.getElementById("branch-select");
    branchSelect.innerHTML = '<option value="">— בחר סניף —</option>';
    document.getElementById("branch-info").style.display = "none";

    if(!chain) {
        branchSelect.disabled = true;
        return;
    }

    const filtered = BRANCHES.filter(b => b.chain === chain);
    filtered.forEach(b => {
        const opt = document.createElement("option");
        opt.value = b.id;
        opt.textContent = b.city + " (" + b.address + ")";
        branchSelect.appendChild(opt);
    });
    branchSelect.disabled = false;
}

function showInfo() {
    const id = document.getElementById("branch-select").value;
    const infoDiv = document.getElementById("branch-info");
    if(!id) { infoDiv.style.display = "none"; return; }
    const b = BRANCHES.find(x => x.id == id);
    infoDiv.innerHTML = `📍 <b>${b.city}</b>: ${b.address}`;
    infoDiv.style.display = "block";
}

function changeQty(n) {
    currentQty = Math.max(1, currentQty + n);
    document.getElementById("qty-val").innerText = currentQty;
}

async function sendOrder() {
    const agent = document.getElementById("agent-name").value.trim();
    const bid = document.getElementById("branch-select").value;
    if(!agent || !bid) { alert("נא למלא שם סוכן ולבחור סניף!"); return; }

    const btn = document.getElementById("send-btn");
    btn.disabled = true; btn.innerText = "שולח נתונים...";

    const b = BRANCHES.find(x => x.id == bid);
    const orderData = {
        agent,
        chain: b.chain,
        branch: b.city,
        quantity: currentQty,
        note: document.getElementById("note").value,
        timestamp: new Date().toLocaleString('he-IL')
    };

    try {
        await fetch(DB_URL, { method: "POST", body: JSON.stringify(orderData) });
        document.getElementById("form-container").style.display = "none";
        document.getElementById("success-screen").style.display = "block";
        document.getElementById("summary").innerText = `נרשמה הזמנה ל${b.chain} ${b.city} עבור ${currentQty} משטחים.`;
    } catch(e) {
        alert("שגיאת תקשורת, נסה שוב");
        btn.disabled = false; btn.innerText = "📦 שלח הזמנה";
    }
}
</script>
</body>
</html>
